<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="edugene-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="edugene-leaf" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#edugene-grad)"/>
  <!-- DNA / book hybrid — open book with leaves (the "gene" of education) -->
  <path d="M14 22 C 14 20, 15 19, 17 19 L 30 19 C 32 19, 32 21, 32 22 L 32 46 C 32 45, 30 44, 28 44 L 17 44 C 15 44, 14 43, 14 41 Z" fill="white" opacity="0.95"/>
  <path d="M50 22 C 50 20, 49 19, 47 19 L 34 19 C 32 19, 32 21, 32 22 L 32 46 C 32 45, 34 44, 36 44 L 47 44 C 49 44, 50 43, 50 41 Z" fill="white" opacity="0.85"/>
