  <path d="M32 12 C 28 12, 24 14, 24 18 C 24 20, 26 21, 28 21 C 30 21, 32 19, 32 16 L 32 12 Z" fill="url(#edugene-leaf)"/>
  <path d="M32 12 C 36 12, 40 14, 40 18 C 40 20, 38 21, 36 21 C 34 21, 32 19, 32 16 L 32 12 Z" fill="url(#edugene-leaf)" opacity="0.9"/>
  <line x1="32" y1="12" x2="32" y2="22" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Book spine highlight -->
  <line x1="32" y1="22" x2="32" y2="46" stroke="#0f766e" stroke-width="1" opacity="0.3"/>
</svg>
